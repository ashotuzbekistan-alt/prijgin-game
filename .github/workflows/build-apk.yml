name: Build Android APK

# Собирается автоматически при каждом push в main, а также вручную из
# вкладки Actions на GitHub (кнопка "Run workflow").
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Забираем код репозитория
        uses: actions/checkout@v4

      - name: Собираем APK через Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable

      - name: Публикуем готовый APK как артефакт сборки
        uses: actions/upload-artifact@v4
        with:
          name: prygkin-apk
          path: ${{ steps.buildozer.outputs.filename }}

      - name: Прикрепляем APK к Release (если это тег версии)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.buildozer.outputs.filename }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
