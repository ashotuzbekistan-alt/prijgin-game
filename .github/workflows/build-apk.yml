name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Забираем код репозитория
        uses: actions/checkout@v4

      - name: Собираем APK через Buildozer
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: "3.11"
          buildozer-cmd: buildozer -v android debug

      - name: Публикуем готовый APK как артефакт сборки
        uses: actions/upload-artifact@v4
        with:
          name: prygkin-apk
          path: ./bin/*.apk

      - name: Прикрепляем APK к Release (если это тег версии)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
